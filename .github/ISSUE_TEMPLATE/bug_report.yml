name: 🐛 Bug report
description: Something in kuba doesn't behave as documented.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please check open issues first to avoid a duplicate.

  - type: input
    id: package
    attributes:
      label: Affected package
      description: Which package under `packages/` is involved? (e.g. `behavior/redirect`, `component/button`)
      placeholder: packages/behavior/redirect
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A short HTML/JS snippet, or a link to a StackBlitz/CodeSandbox, that reproduces the issue.
      render: html
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: kuba version
      placeholder: 0.1.0-alpha.12
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Browser / runtime
      placeholder: Chrome 126, Node 20, Bun 1.1
    validations:
      required: false
